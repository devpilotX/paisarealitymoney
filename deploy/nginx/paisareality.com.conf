# paisareality.com and admin.paisareality.com
# Cloudflare Origin to Nginx to Next.js (127.0.0.1:3000)
#
# The Next.js middleware routes the admin area by host:
#   - admin.paisareality.com serves the /admin dashboard
#   - paisareality.com/admin returns 404 (admin is not available on the main domain)
#
# TLS uses the Cloudflare Origin certificate, whose SAN list includes
# *.paisareality.com and paisareality.com, so it covers the admin subdomain.
#
# Apply on the VPS:
#   sudo cp deploy/nginx/paisareality.com.conf /etc/nginx/sites-available/paisareality.com
#   sudo ln -sf /etc/nginx/sites-available/paisareality.com /etc/nginx/sites-enabled/paisareality.com
#   sudo nginx -t && sudo systemctl reload nginx

# Redirect HTTP to HTTPS for the main domain and the admin subdomain.
server {
    listen 80;
    listen [::]:80;
    server_name paisareality.com www.paisareality.com admin.paisareality.com;
    return 301 https://$host$request_uri;
}

# Canonical host: 301-redirect https://www.paisareality.com to the non-www host,
# so Google consolidates all ranking signals on a single hostname.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.paisareality.com;

    ssl_certificate     /etc/ssl/cloudflare/paisareality.pem;
    ssl_certificate_key /etc/ssl/cloudflare/paisareality.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    return 301 https://paisareality.com$request_uri;
}

# Main site: paisareality.com (canonical, non-www)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name paisareality.com;

    ssl_certificate     /etc/ssl/cloudflare/paisareality.pem;
    ssl_certificate_key /etc/ssl/cloudflare/paisareality.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

# Admin dashboard: admin.paisareality.com only.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.paisareality.com;

    ssl_certificate     /etc/ssl/cloudflare/paisareality.pem;
    ssl_certificate_key /etc/ssl/cloudflare/paisareality.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # The admin area must never be indexed by search engines.
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
