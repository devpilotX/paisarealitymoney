# Gate every push and PR: strict typecheck + the full unit test suite.
# All test suites are DB-free by design, so no services or secrets are needed.
# The production build runs at deploy time on the server (it needs env + DB).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (strict)
        run: npm run typecheck

      - name: Unit tests
        run: npm test
